name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages is served from the gh-pages branch; the workflow only needs to push to it.
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: /mergers
          # Publishable Supabase values (anon key is designed to be public and is
          # compiled into the client bundle either way). The SharePoint Edge Function
          # is additionally protected by a team access passcode entered in the app.
          NEXT_PUBLIC_SUPABASE_URL: https://gyligrsjpvniupfvczqb.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5bGlncnNqcHZuaXVwZnZjenFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MTMxNjIsImV4cCI6MjA5ODA4OTE2Mn0.uhOENWyD5XmQYfbS34uzLxnNcb7Dt2gPEcS97Xk2p5A
          # Read live application data at runtime from the gated `data` Edge
          # Function (always-fresh). Falls back to seed until the passcode unlocks.
          NEXT_PUBLIC_DATA_BACKEND: supabase
        run: npm run build

      - name: Publish to gh-pages
        run: |
          cd out
          touch .nojekyll
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${GITHUB_SHA} to GitHub Pages"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
